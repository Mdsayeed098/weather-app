<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Cities — WeatherIQ</title>
    <meta name="description" content="Compare weather data between two cities side by side.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=5">
    <style>
        body { background: var(--bg-base); min-height: 100vh; }

        .compare-page { max-width: 1280px; margin: 0 auto; padding: 30px 20px; }

        /* Back button */
        .back-link { display: inline-flex; align-items: center; gap: 10px; color: var(--text-secondary); text-decoration: none; font-weight: 500; margin-bottom: 24px; transition: color 0.2s; font-size: 0.95rem; }
        .back-link:hover { color: var(--accent); }

        /* Page Title */
        .compare-title { font-family: var(--head); font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
        .compare-subtitle { color: var(--text-secondary); margin-bottom: 30px; font-size: 0.95rem; }

        /* Search Section */
        .compare-search { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 40px; }
        .compare-input-group { flex: 1; min-width: 200px; position: relative; }
        .compare-input-group label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .compare-input {
            width: 100%; padding: 12px 16px 12px 42px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
            color: var(--text-primary); font-family: var(--font); font-size: 0.95rem;
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            outline: none; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .compare-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .compare-input::placeholder { color: var(--text-muted); }
        .compare-input-icon { position: absolute; left: 14px; bottom: 14px; color: var(--text-muted); font-size: 0.9rem; pointer-events: none; }
        .compare-input-group:focus-within .compare-input-icon { color: var(--accent); }

        /* Autocomplete dropdown */
        .compare-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; margin-top: 6px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
            backdrop-filter: var(--blur); list-style: none; max-height: 200px; overflow-y: auto;
            box-shadow: var(--shadow); z-index: 50; display: none;
        }
        .compare-dropdown.open { display: block; }
        .compare-dropdown li { padding: 10px 14px; cursor: pointer; font-size: 0.88rem; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .compare-dropdown li:hover { background: rgba(128,128,128,0.1); }
        .compare-dropdown li i { color: var(--text-muted); font-size: 0.75rem; }

        .compare-btn {
            padding: 12px 28px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #00f2fe);
            color: #0a0e1a; font-family: var(--font); font-size: 0.95rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 20px var(--accent-glow); transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap; min-height: 46px;
        }
        .compare-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
        .compare-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* VS Separator */
        .vs-badge { display: flex; align-items: center; justify-content: center; padding-bottom: 0; }
        .vs-text { font-family: var(--head); font-size: 1.5rem; font-weight: 800; color: var(--text-muted); }

        /* Results */
        .compare-results { display: none; animation: fadeInUp 0.5s ease both; }
        .compare-results.visible { display: block; }

        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 30px; }

        .city-hero {
            border-radius: 20px; padding: 30px; text-align: center; position: relative; overflow: hidden;
            border: 1px solid var(--border); backdrop-filter: var(--blur);
            transition: background 0.5s;
        }
        .city-hero-name { font-family: var(--head); font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
        .city-hero-country { color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-bottom: 16px; }
        .city-hero-temp-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .city-hero-temp { font-family: var(--head); font-size: 3.5rem; font-weight: 800; line-height: 1; }
        .city-hero-icon { width: 70px; height: 70px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .city-hero-desc { text-transform: capitalize; font-size: 1rem; color: rgba(255,255,255,0.85); }

        /* Warm theme */
        .city-hero.theme-hot { background: linear-gradient(135deg, #f97316, #ef4444, #dc2626); color: #fff; }
        .city-hero.theme-warm { background: linear-gradient(135deg, #f59e0b, #f97316); color: #fff; }
        .city-hero.theme-mild { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
        .city-hero.theme-cool { background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; }
        .city-hero.theme-cold { background: linear-gradient(135deg, #06b6d4, #3b82f6, #1e3a8a); color: #fff; }
        .city-hero.theme-freezing { background: linear-gradient(135deg, #67e8f9, #a5f3fc, #e0f2fe); color: #0c4a6e; }

        /* Metrics Table */
        .metrics-table {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px;
            backdrop-filter: var(--blur); overflow: hidden;
        }
        .metric-row {
            display: grid; grid-template-columns: 1fr 120px 1fr; align-items: center;
            padding: 14px 20px; border-bottom: 1px solid var(--border); transition: background 0.2s;
        }
        .metric-row:last-child { border-bottom: none; }
        .metric-row:hover { background: rgba(128,128,128,0.05); }

        .metric-label { text-align: center; font-size: 0.82rem; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .metric-label i { font-size: 0.85rem; color: var(--text-muted); }

        .metric-val { font-family: var(--head); font-size: 1.1rem; font-weight: 600; }
        .metric-val.left { text-align: right; padding-right: 20px; }
        .metric-val.right { text-align: left; padding-left: 20px; }
        .metric-sub { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; font-family: var(--font); }

        .metric-winner { color: #4ade80; position: relative; }
        .metric-winner::after { content: '✓'; margin-left: 6px; font-size: 0.7rem; }

        .metric-header { background: rgba(128,128,128,0.05); font-weight: 600; font-size: 0.9rem; }
        .metric-header .metric-val { font-size: 0.95rem; color: var(--accent); }

        /* Empty state */
        .compare-empty {
            text-align: center; padding: 80px 30px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px;
            backdrop-filter: var(--blur);
        }
        .compare-empty-icon { font-size: 3rem; color: var(--text-muted); margin-bottom: 20px; }
        .compare-empty h3 { font-family: var(--head); font-size: 1.3rem; margin-bottom: 8px; }
        .compare-empty p { color: var(--text-muted); font-size: 0.9rem; }

        /* Toast */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px); background: #ef4444; color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4); z-index: 9000; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #toast.show { transform: translate(-50%, 0); }

        /* Auth guard */
        .auth-overlay { position: fixed; inset: 0; z-index: 10000; background: var(--bg-base); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 700px) {
            .compare-grid { grid-template-columns: 1fr; }
            .compare-search { flex-direction: column; }
            .metric-row { grid-template-columns: 1fr 90px 1fr; padding: 10px 12px; }
            .metric-val { font-size: 0.95rem; }
            .metric-val.left { padding-right: 10px; }
            .metric-val.right { padding-left: 10px; }
        }
    </style>
</head>
<body>
    <!-- Auth Guard -->
    <div class="auth-overlay" id="auth-overlay">
        <div class="spinner"></div>
        <p style="color: var(--text-secondary)">Verifying session...</p>
    </div>

    <!-- Toast -->
    <div id="toast"><i class="fa-solid fa-circle-exclamation"></i><span id="toast-msg">Error</span></div>

    <div class="compare-page" id="main-content" style="display:none;">
        <a href="dashboard.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>

        <h1 class="compare-title"><i class="fa-solid fa-code-compare" style="color: var(--accent); margin-right: 10px;"></i>Compare Cities</h1>
        <p class="compare-subtitle">Select two cities to see a detailed weather comparison side by side.</p>

        <!-- Search Inputs -->
        <div class="compare-search">
            <div class="compare-input-group">
                <label for="city-a">City A</label>
                <i class="fa-solid fa-location-dot compare-input-icon"></i>
                <input type="text" id="city-a" class="compare-input" placeholder="e.g. New York" autocomplete="off">
                <ul class="compare-dropdown" id="dropdown-a"></ul>
            </div>
            <div class="vs-badge"><span class="vs-text">VS</span></div>
            <div class="compare-input-group">
                <label for="city-b">City B</label>
                <i class="fa-solid fa-location-dot compare-input-icon"></i>
                <input type="text" id="city-b" class="compare-input" placeholder="e.g. London" autocomplete="off">
                <ul class="compare-dropdown" id="dropdown-b"></ul>
            </div>
            <button class="compare-btn" id="compare-btn"><i class="fa-solid fa-scale-balanced"></i> Compare</button>
        </div>

        <!-- Empty State -->
        <div class="compare-empty" id="compare-empty">
            <div class="compare-empty-icon"><i class="fa-solid fa-city"></i></div>
            <h3>Pick Two Cities</h3>
            <p>Enter city names above and hit Compare to see the magic.</p>
        </div>

        <!-- Results Container -->
        <div class="compare-results" id="compare-results">
            <!-- City Hero Cards -->
            <div class="compare-grid" id="city-heroes"></div>

            <!-- Metrics Table -->
            <div class="metrics-table" id="metrics-table"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js?v=2"></script>
    <script src="compare.js?v=2"></script>
</body>
</html>
