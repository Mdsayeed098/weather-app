<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Weather App</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="particle-container"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="search-box">
                <i class="fa-solid fa-location-dot location-icon"></i>
                <input type="text" id="city-input" placeholder="Search for any city (e.g., Mumbai)..." autocomplete="off">
                <button id="search-btn" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div class="header-controls">
                <button id="unit-toggle" class="btn-glass">°C / °F</button>
            </div>
        </header>

        <main class="weather-card">
            <!-- Loading Indicator -->
            <div id="loading" class="loading-container hidden">
                <div class="spinner"></div>
                <p>Fetching weather data...</p>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="error-container hidden">
                <i class="fa-solid fa-circle-exclamation"></i>
                <p id="error-text">City not found. Please try again.</p>
            </div>

            <!-- Weather Information -->
            <div id="weather-info" class="weather-info hidden">
                <div class="main-weather">
                    <div class="weather-icon-container">
                        <img id="weather-icon" src="" alt="Weather Icon" class="weather-icon">
                    </div>
                    <div class="temperature-container">
                        <h1 id="temperature">--</h1>
                        <span class="unit" id="current-unit">°C</span>
                    </div>
                    <h2 id="condition">--</h2>
                    <h3 id="location">--</h3>
                    <p id="date-time">--</p>
                </div>

                <div class="weather-details-grid">
                    <div class="detail-card">
                        <i class="fa-solid fa-droplet"></i>
                        <p class="detail-label">Humidity</p>
                        <p id="humidity" class="detail-value">--%</p>
                    </div>
                    <div class="detail-card">
                        <i class="fa-solid fa-wind"></i>
                        <p class="detail-label">Wind Speed</p>
                        <p id="wind-speed" class="detail-value">-- km/h</p>
                    </div>
                    <div class="detail-card">
                        <i class="fa-solid fa-temperature-half"></i>
                        <p class="detail-label">Feels Like</p>
                        <p id="feels-like" class="detail-value">--°</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- 5 Day Forecast -->
        <section class="forecast-container hidden" id="forecast-container">
            <h3 class="forecast-title">5-Day Forecast</h3>
            <div class="forecast-grid" id="forecast-grid">
                <!-- Forecast child elements will be injected here by JS -->
            </div>
        </section>
    </div>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
